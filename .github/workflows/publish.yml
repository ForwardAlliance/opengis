name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Verify versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck
        working-directory: packages/opengis

      - name: Build
        run: bun run build
        working-directory: packages/opengis

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/opengis
